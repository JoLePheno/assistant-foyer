<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Assistant Foyer – maison en pleine canicule">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE7A6"/>
      <stop offset="1" stop-color="#FFB067"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF3C4"/>
      <stop offset="0.55" stop-color="#FFC24B"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </radialGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8FAE99"/>
      <stop offset="1" stop-color="#7C9885"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF6DA"/>
      <stop offset="1" stop-color="#FFD98A"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi (squircle) -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Soleil de canicule + rayons -->
  <g stroke="#FFAE4D" stroke-width="14" stroke-linecap="round" opacity="0.9">
    <line x1="386" y1="70" x2="386" y2="30"/>
    <line x1="452" y1="136" x2="492" y2="136"/>
    <line x1="437" y1="87" x2="466" y2="58"/>
    <line x1="437" y1="185" x2="466" y2="214"/>
    <line x1="335" y1="87" x2="306" y2="58"/>
  </g>
  <circle cx="386" cy="136" r="60" fill="url(#sun)"/>

  <!-- Ondes de chaleur -->
  <g stroke="#FF8A3D" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M96 150 q18 -18 36 0 t36 0 t36 0"/>
    <path d="M92 196 q18 -18 36 0 t36 0"/>
  </g>

  <!-- Ombre douce sous la maison -->
  <ellipse cx="256" cy="432" rx="150" ry="20" fill="#E8863F" opacity="0.35"/>

  <!-- Toit -->
  <path d="M256 176 L410 300 L102 300 Z" fill="url(#roof)"/>
  <path d="M256 176 L410 300 L102 300 Z" fill="#000" opacity="0.06"/>

  <!-- Corps de la maison -->
  <rect x="140" y="290" width="232" height="150" rx="16" fill="#FFFDF8"/>

  <!-- Fenêtre avec le couple -->
  <rect x="180" y="310" width="152" height="120" rx="12" fill="url(#window)"/>

  <!-- Femme (peau claire, cheveux longs, robe) -->
  <g>
    <ellipse cx="224" cy="352" rx="22" ry="30" fill="#6E4A32"/>            <!-- cheveux longs (arrière) -->
    <path d="M224 372 L248 424 H200 Z" fill="#E39AA0"/>                     <!-- robe -->
    <rect x="217" y="360" width="14" height="18" fill="#F5D3B3"/>           <!-- cou -->
    <circle cx="224" cy="348" r="17" fill="#F5D3B3"/>                       <!-- visage -->
    <path d="M208 344 q16 -18 32 0 q-16 -8 -32 0 Z" fill="#6E4A32"/>        <!-- frange -->
    <circle cx="218" cy="349" r="2.4" fill="#3B3A36"/>                      <!-- oeil g -->
    <circle cx="230" cy="349" r="2.4" fill="#3B3A36"/>                      <!-- oeil d -->
    <path d="M218 356 q6 5 12 0" stroke="#3B3A36" stroke-width="2" fill="none" stroke-linecap="round"/> <!-- sourire -->
  </g>

  <!-- Homme (peau claire, cheveux courts, chemise, menton dégagé) -->
  <g>
    <path d="M258 424 L274 396 Q288 392 302 396 L318 424 Z" fill="#6C8CB5"/> <!-- chemise -->
    <rect x="281" y="360" width="14" height="34" fill="#F5D3B3"/>           <!-- cou -->
    <circle cx="288" cy="348" r="17" fill="#F5D3B3"/>                       <!-- visage -->
    <path d="M271 346 q0 -21 17 -21 q17 0 17 21 q-8 -9 -17 -9 q-9 0 -17 9 Z" fill="#5A3E29"/> <!-- cheveux courts -->
    <circle cx="282" cy="349" r="2.4" fill="#3B3A36"/>                      <!-- oeil g -->
    <circle cx="294" cy="349" r="2.4" fill="#3B3A36"/>                      <!-- oeil d -->
    <path d="M282 356 q6 5 12 0" stroke="#3B3A36" stroke-width="2" fill="none" stroke-linecap="round"/> <!-- sourire -->
  </g>

  <!-- petit coeur entre eux -->
  <path d="M256 349 q-9 -8 -9 -15 a5 5 0 0 1 9 -3 a5 5 0 0 1 9 3 q0 7 -9 15 Z" fill="#E06A5B"/>

  <!-- cadre de la fenêtre -->
  <rect x="180" y="310" width="152" height="120" rx="12" fill="none" stroke="#B98A3C" stroke-width="6" opacity="0.7"/>
</svg>




